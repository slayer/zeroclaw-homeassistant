name: ZeroClaw Assistant
version: "0.1.24"
slug: zeroclaw_assistant
description: Run ZeroClaw AI agent runtime as a Home Assistant addon
url: https://github.com/slayer/zeroclaw
arch:
  - amd64
  - aarch64
startup: services
boot: auto
init: false
hassio_api: true
homeassistant_api: true
panel_icon: mdi:hook
ingress: true
ingress_port: 42617
ports:
  42617/tcp: 42617
ports_description:
  42617/tcp: ZeroClaw Gateway
map:
  - addon_config:rw
  - share:rw
options:
  zeroclaw_version: "v0.4.3-beta.9"
  llm_provider: "openrouter"
  api_key: ""
  default_model: ""
  gateway_port: 42617
  env_vars: []
schema:
  zeroclaw_version: str
  llm_provider: list(openrouter|anthropic|openai|groq|mistral|deepseek|together|fireworks|ollama|gemini|bedrock|qwen|venice|cloudflare|moonshot|xai|novita|perplexity|cohere|lmstudio|nvidia|custom)
  api_key: password
  default_model: str?
  gateway_port: int(1024,65535)
  env_vars:
    - name: str
      value: str
